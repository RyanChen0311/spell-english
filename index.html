<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Vocabulary Learning</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>英文朗誦記憶</h1>

        <div class="input-section">
            <input type="text" id="englishWord" placeholder="輸入英文單字" />
            <input type="text" id="chineseTranslation" placeholder="輸入中文意思" />
            <button id="addWord">新增</button>
        </div>

        <div class="record-section">
            <div class="record-controls">
                <input type="text" id="recordName" placeholder="單字表名稱" />
                <button id="saveRecord">存成單字表</button>
                <select id="recordList">
                    <option value="">單字表名稱</option>
                </select>
                <button id="loadRecord">選擇單字表</button>
                <button id="deleteRecord">刪除單字表</button>
            </div>
        </div>

        <div class="word-list">
            <h2 id="wordListTitle" style="display:none">單字表</h2>
            <div id="wordContainer"></div>
        </div>
    </div>

    <template id="word-template">
        <div class="word-item">
            <div class="word-content">
                <div class="english-word"></div>
                <div class="spelling"></div>
                <div class="chinese-translation"></div>
                <div class="example-sentence"></div>
                <div class="example-zh"></div>
            </div>
            <div class="word-actions">
                <button class="speak-btn">🔊</button>
                <button class="delete-btn">❌</button>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
